name: Release

on:
  push:
    tags:
      - 'v[0-9]*.*.*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Enable Windows subsystem
        shell: pwsh
        run: |
          (Get-Content src/main.rs) -replace '// #!\[windows_subsystem', '#![windows_subsystem' | Set-Content src/main.rs

      - name: Build release binary
        run: cargo build --release

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss /DMyAppVersion=$version

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/DraftWatchSetup-*.exe
          generate_release_notes: true
